<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 32px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        p {
            font-size: 16px;
            opacity: 0.85;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .counter {
            font-size: 48px;
            font-weight: 800;
            margin: 16px 0;
        }

        button {
            background: #fff;
            color: #764ba2;
            border: none;
            border-radius: 12px;
            padding: 14px 32px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        .info {
            margin-top: 24px;
            font-size: 13px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>HTML View</h1>
        <p>This entire screen is rendered from HTML/CSS inside the native app.</p>

        <div class="counter" id="count">0</div>

        <button onclick="increment()">Tap me</button>

        <p class="info">Tap the button — it sends a message to Swift</p>
    </div>

    <script>
        let count = 0;

        function increment() {
            count++;
            document.getElementById('count').textContent = count;

            // Send message to native Swift code
            if (window.webkit && window.webkit.messageHandlers.bridge) {
                window.webkit.messageHandlers.bridge.postMessage("count:" + count);
            }
        }
    </script>
</body>
</html>
